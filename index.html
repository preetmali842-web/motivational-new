<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="InspireFlow - Premium motivational quotes platform with 5000+ unique quotes from 300+ authors.">
<meta name="keywords" content="motivational quotes, inspirational quotes, author quotes, quote of the day">
<meta name="author" content="InspireFlow">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#246b6b">
<meta property="og:type" content="website">
<meta property="og:title" content="InspireFlow - Premium Motivational Quotes">
<meta property="og:description" content="Explore 5000+ unique motivational quotes and author profiles.">
<meta property="og:image" content="https://ui-avatars.com/api/?name=InspireFlow&size=1200&background=246b6b&color=ffffff&bold=true">
<meta property="og:site_name" content="InspireFlow">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="InspireFlow - Premium Motivational Quotes">
<title>InspireFlow - Premium Motivational Quotes</title>
<style>
:root{color-scheme:light;--glass-bg:rgba(255,255,255,0.34);--glass-border:rgba(255,255,255,0.46);--glass-shadow:0 8px 24px rgba(28,43,58,0.12);--bg-gradient:linear-gradient(135deg,#f4c86a 0%,#65c3ba 34%,#7d8ee6 68%,#dc6e88 100%);--bg-overlay:rgba(255,255,255,0.22);--text-primary:#172126;--text-secondary:#41515a;--card-bg:rgba(255,255,255,0.42);--card-hover:rgba(255,255,255,0.62);--accent:#246b6b;--accent2:#b84c6a;--accent3:#d69b2d;--btn-bg:rgba(255,255,255,0.34);--btn-hover:rgba(255,255,255,0.64);--input-bg:rgba(255,255,255,0.48);--modal-bg:rgba(12,18,24,0.52);--tag-bg:rgba(36,107,107,0.16);--tag-text:#155757;--transition:180ms ease;--radius:22px}
[data-theme="dark"]{color-scheme:dark;--glass-bg:rgba(17,25,38,0.62);--glass-border:rgba(255,255,255,0.12);--glass-shadow:0 8px 24px rgba(0,0,0,0.28);--bg-gradient:linear-gradient(135deg,#101820 0%,#17464a 34%,#332f55 68%,#5c2838 100%);--bg-overlay:rgba(0,0,0,0.36);--text-primary:#f3f7f7;--text-secondary:#c7d4d6;--card-bg:rgba(19,30,45,0.66);--card-hover:rgba(30,47,68,0.78);--accent:#5cc8bc;--accent2:#f28aa5;--accent3:#f2c463;--btn-bg:rgba(255,255,255,0.08);--btn-hover:rgba(255,255,255,0.16);--input-bg:rgba(19,30,45,0.74);--modal-bg:rgba(0,0,0,0.72);--tag-bg:rgba(92,200,188,0.16);--tag-text:#9de3dc}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg-gradient);background-size:300% 300%;animation:bgShift 24s ease infinite;color:var(--text-primary);font-family:"Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.5;overflow-x:hidden;position:relative;text-rendering:optimizeLegibility}
body::before{background:var(--bg-overlay);content:"";inset:0;pointer-events:none;position:fixed;z-index:-1}
button,input,select{font:inherit}
button:focus-visible,input:focus-visible,select:focus-visible,[tabindex]:focus-visible{outline:3px solid color-mix(in srgb,var(--accent3),white 10%);outline-offset:2px}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.particles{inset:0;overflow:hidden;pointer-events:none;position:fixed;z-index:0}
.particle{background:rgba(255,255,255,0.48);border-radius:50%;position:absolute;transform:translate3d(0,0,0);animation:floatUp linear infinite;will-change:transform,opacity}
@keyframes floatUp{0%{opacity:0;transform:translate3d(0,110vh,0) scale(0.4)}12%{opacity:0.78}88%{opacity:0.5}100%{opacity:0;transform:translate3d(0,-12vh,0) scale(1.4)}}
.navbar{align-items:center;background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);box-shadow:var(--glass-shadow);display:flex;flex-wrap:wrap;gap:0.8rem;justify-content:space-between;padding:0.7rem clamp(0.85rem,2vw,1.5rem);position:sticky;top:0;z-index:100}
.logo{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer;font-size:clamp(1.25rem,2vw,1.72rem);font-weight:850;white-space:nowrap}
.nav-links{display:flex;flex:1 1 540px;flex-wrap:wrap;gap:0.4rem;justify-content:center;list-style:none}
.nav-links button,.theme-toggle,.btn{background:var(--btn-bg);border:1px solid var(--glass-border);color:var(--text-primary);cursor:pointer;transition:all var(--transition)}
.nav-links button{border-radius:999px;font-size:0.9rem;font-weight:700;min-height:40px;padding:0.5rem 1rem;white-space:nowrap}
.nav-links button:hover,.nav-links button.active{background:var(--btn-hover);border-color:color-mix(in srgb,var(--accent),white 20%);box-shadow:0 6px 16px rgba(36,107,107,0.14);transform:translateY(-1px)}
.theme-toggle{align-items:center;border-radius:50%;display:inline-flex;font-size:1.2rem;height:44px;justify-content:center;width:44px}
.main-container{margin:0 auto;max-width:1320px;padding:clamp(1rem,2vw,1.5rem);position:relative;z-index:1}
.section{display:none;animation:fadeSlideIn 260ms ease}
@media(prefers-reduced-motion:reduce){.section{animation:none}}
.section.active{display:block}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.glass-card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--glass-shadow);transition:all var(--transition)}
.glass-card:hover{background:var(--card-hover);box-shadow:0 12px 32px rgba(0,0,0,0.12);transform:translateY(-2px)}
.quote-of-day-banner{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;box-shadow:0 6px 20px rgba(36,107,107,0.14);color:#fff;font-weight:800;margin-bottom:1rem;padding:0.7rem 1rem;text-align:center;font-size:0.95rem}
.counter-strip{display:grid;gap:0.8rem;grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:1rem}
.counter-card{padding:0.9rem 1rem;text-align:center}
.counter-card strong{display:block;font-size:clamp(1.35rem,3vw,2rem);line-height:1.1;font-weight:800}
.counter-card span{color:var(--text-secondary);font-size:0.85rem;font-weight:700;text-transform:uppercase}
.search-panel{margin-bottom:1.2rem;padding:1rem}
.search-container{align-items:center;display:flex;flex-wrap:wrap;gap:0.8rem;margin-bottom:1rem}
.search-input,.search-select{background:var(--input-bg);border:1px solid var(--glass-border);border-radius:999px;color:var(--text-primary);min-height:44px;outline:none;transition:all var(--transition)}
.search-input{flex:1 1 260px;font-size:1rem;padding:0.7rem 1.1rem}
.search-select{cursor:pointer;flex:0 1 200px;padding:0.7rem 0.9rem}
.search-input:focus,.search-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(36,107,107,0.12)}
.quote-main{margin-bottom:1.4rem;overflow:hidden;padding:clamp(1.4rem,5vw,3rem) clamp(1rem,4vw,2rem);position:relative;text-align:center}
.quote-main::before{color:var(--text-primary);content:'"';font-family:Georgia,serif;font-size:clamp(6rem,15vw,12rem);left:1rem;line-height:0.8;opacity:0.04;pointer-events:none;position:absolute;top:-0.5rem}
.quote-text{font-size:clamp(1.35rem,4vw,2.2rem);font-weight:820;line-height:1.36;margin:0 auto 1.1rem;max-width:980px;position:relative;text-wrap:balance;z-index:1}
.quote-author-row{align-items:center;display:flex;flex-wrap:wrap;gap:0.9rem;justify-content:center}
.author-photo,.author-photo-lg{background:var(--tag-bg);border:3px solid var(--accent);border-radius:50%;box-shadow:0 4px 16px rgba(36,107,107,0.18);object-fit:cover}
.author-photo{height:64px;width:64px}
.author-info{text-align:left}
.author-name{font-size:1.2rem;font-weight:800}
.author-profession{color:var(--text-secondary);font-size:0.9rem;font-weight:600}
.category-badge{background:var(--tag-bg);border:1px solid color-mix(in srgb,var(--accent),transparent 72%);border-radius:999px;color:var(--tag-text);display:inline-block;font-size:0.75rem;font-weight:800;margin-top:0.6rem;padding:0.32rem 0.8rem;text-transform:uppercase}
.about-author{color:var(--text-secondary);font-size:0.9rem;line-height:1.6;margin:0.9rem auto 0;max-width:760px}
.btn-row{display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin-top:1.2rem}
.btn{align-items:center;border-radius:999px;display:inline-flex;font-size:0.85rem;font-weight:760;gap:0.3rem;justify-content:center;min-height:40px;padding:0.5rem 1rem;position:relative;white-space:nowrap}
.btn:hover{background:var(--btn-hover);border-color:var(--accent);box-shadow:0 6px 16px rgba(0,0,0,0.1);transform:translateY(-1px)}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.accent:hover{background:var(--accent2);border-color:var(--accent2)}
.timer-bar{background:rgba(255,255,255,0.18);border-radius:999px;height:2px;margin:1.2rem auto 0;max-width:380px;overflow:hidden}
.timer-fill{background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:inherit;height:100%;width:100%}
.section-heading{align-items:center;display:flex;flex-wrap:wrap;gap:0.7rem;justify-content:space-between;margin-bottom:1rem}
.section-heading h2{font-size:clamp(1.3rem,3vw,1.9rem)}
.muted-pill{background:var(--btn-bg);border:1px solid var(--glass-border);border-radius:999px;color:var(--text-secondary);font-size:0.8rem;font-weight:800;padding:0.4rem 0.8rem}
.authors-grid{display:grid;gap:1rem;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.author-card{cursor:pointer;padding:1.2rem 1rem;text-align:center;transition:all var(--transition)}
.author-card:hover{transform:translateY(-2px)}
.author-photo-lg{height:88px;margin-bottom:0.75rem;width:88px}
.author-card h3{font-size:1rem;margin-bottom:0.15rem;font-weight:800}
.author-card .meta,.quote-list-card small{color:var(--text-secondary);font-size:0.8rem}
.quote-list{display:grid;gap:0.6rem}
.quote-list-card{cursor:pointer;padding:0.95rem;transition:all var(--transition)}
.quote-list-card:hover{background:rgba(255,255,255,0.06)}
.quote-list-card p{font-weight:700;line-height:1.4}
.score-chip{background:color-mix(in srgb,var(--accent3),transparent 76%);border-radius:999px;color:var(--text-primary);display:inline-flex;font-size:0.72rem;font-weight:800;margin-top:0.35rem;padding:0.2rem 0.5rem}
.trending-row{display:grid;gap:0.8rem;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.modal-overlay{align-items:center;animation:fadeIn 180ms ease;background:var(--modal-bg);backdrop-filter:blur(4px);display:flex;inset:0;justify-content:center;padding:1rem;position:fixed;z-index:200;opacity:0}
.modal-overlay.hidden{display:none}
.modal-overlay.visible{opacity:1}
.modal-content{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:80vh;max-width:720px;overflow-y:auto;padding:clamp(1rem,3vw,1.8rem);width:min(94vw,720px)}
.modal-close{background:transparent;border:0;color:var(--text-primary);cursor:pointer;float:right;font-size:1.6rem;line-height:1;padding:0;transition:all 200ms ease}
.modal-close:hover{color:var(--accent2);transform:rotate(90deg)}
.toast{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:999px;bottom:24px;box-shadow:var(--glass-shadow);font-weight:800;left:50%;max-width:min(90vw,480px);padding:0.7rem 1.3rem;pointer-events:none;position:fixed;text-align:center;transform:translateX(-50%) translateY(120px);z-index:300;animation:toastSlide 300ms ease forwards;font-size:0.9rem}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes toastSlide{to{transform:translateX(-50%) translateY(0)}}
.reading-progress{background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));border-radius:0 2px 2px 0;height:2px;left:0;position:fixed;top:0;transition:width 120ms linear;width:0%;z-index:250}
.heart-beat,.favorite-pop{animation:heartBeat 400ms ease;will-change:transform}
@keyframes heartBeat{0%,100%{transform:scale(1)}30%{transform:scale(1.15)}60%{transform:scale(0.98)}}
.skeleton-grid{display:grid;gap:0.8rem;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.skeleton-card,.skeleton-line{animation:shimmer 1s linear infinite;background:linear-gradient(90deg,rgba(255,255,255,0.08),rgba(255,255,255,0.3),rgba(255,255,255,0.08));background-size:200% 100%;border-radius:16px}
.skeleton-card{height:120px}
.skeleton-line{height:16px;margin:0.4rem 0}
@keyframes shimmer{to{background-position:-200% 0}}
.stats-grid{display:grid;gap:1rem;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.stat-panel{padding:1rem}
.stat-panel h3{margin-bottom:0.5rem;font-weight:800;font-size:0.95rem}
.bar-row{display:grid;gap:0.3rem;margin-bottom:0.6rem}
.bar-label{display:flex;font-size:0.8rem;font-weight:760;justify-content:space-between}
.bar-track{background:rgba(255,255,255,0.16);border-radius:999px;height:6px;overflow:hidden}
.bar-fill{background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:inherit;height:100%}
.load-more-row{display:flex;justify-content:center;padding:0.8rem 0}
.empty-state{color:var(--text-secondary);padding:2rem 1rem;text-align:center;font-size:0.95rem}
@media(max-width:900px){
.nav-links{justify-content:flex-start;overflow-x:auto;padding-bottom:0.1rem;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.nav-links::-webkit-scrollbar{height:4px}
.nav-links::-webkit-scrollbar-thumb{background:rgba(36,107,107,0.2);border-radius:2px}
.counter-strip{grid-template-columns:repeat(3,1fr)}
.authors-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
}
@media(max-width:640px){
.navbar{gap:0.6rem}
.logo{font-size:1.3rem}
.nav-links{flex-basis:100%;font-size:0.85rem}
.nav-links button{font-size:0.75rem;min-height:36px;padding:0.4rem 0.65rem}
.counter-strip{grid-template-columns:1fr}
.quote-author-row{text-align:center}
.author-info{flex-basis:100%;text-align:center}
.btn{flex:1 1 calc(50% - 0.3rem);min-width:0;padding:0.45rem 0.7rem;font-size:0.8rem}
.authors-grid,.stats-grid{grid-template-columns:1fr}
.search-select{flex:0 1 160px}
.modal-content{padding:1rem}
}
@media(prefers-reduced-motion:reduce){
.particle{animation:none}
*,*::before,*::after{animation-duration:0.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:0.001ms!important}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--accent),transparent 30%);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--accent),transparent 20%)}
</style>
</head>
<body>
<div class="reading-progress" id="readingProgress"></div>
<div class="particles" id="particlesContainer" aria-hidden="true"></div>
<div class="toast" id="toast" role="status" aria-live="polite" style="display:none"></div>

<nav class="navbar" aria-label="Primary">
<span class="logo" onclick="navigateTo('home')" tabindex="0" role="button">InspireFlow</span>
<ul class="nav-links">
<li><button class="active" data-nav="home" onclick="navigateTo('home')">Home</button></li>
<li><button data-nav="authors" onclick="navigateTo('authors')">Authors</button></li>
<li><button data-nav="categories" onclick="navigateTo('categories')">Categories</button></li>
<li><button data-nav="favorites" onclick="navigateTo('favorites')">Favorites</button></li>
<li><button data-nav="top100" onclick="navigateTo('top100')">Top 100</button></li>
<li><button data-nav="stats" onclick="navigateTo('stats')">Stats</button></li>
</ul>
<button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">☾</button>
</nav>

<main class="main-container">
<section class="section active" id="section-home" aria-labelledby="homeHeading">
<h1 id="homeHeading" style="position:absolute;left:-9999px">InspireFlow Motivational Quotes</h1>
<div class="quote-of-day-banner">Quote of the Day</div>

<div class="counter-strip" aria-label="Collection counters">
<div class="glass-card counter-card"><strong id="quoteCounter">0</strong><span>Quotes</span></div>
<div class="glass-card counter-card"><strong id="authorCounter">0</strong><span>Authors</span></div>
<div class="glass-card counter-card"><strong id="categoryCounter">0</strong><span>Categories</span></div>
</div>

<div class="glass-card search-panel">
<div class="search-container" style="margin-bottom:0">
<input class="search-input" id="quoteSearch" type="search" placeholder="Search quotes, authors, categories..." oninput="debounceSearch(this)">
<select class="search-select" id="quoteCategoryFilter" onchange="performQuoteSearch()">
<option value="">All</option>
</select>
</div>
<div id="quoteSearchResults" class="quote-list" style="margin-top:1rem"></div>
</div>

<div class="glass-card quote-main" id="quoteCard">
<p class="quote-text" id="quoteText">Loading...</p>
<div class="quote-author-row">
<img class="author-photo" id="authorPhoto" src="https://ui-avatars.com/api/?name=Author&size=130&background=246b6b&color=fff&bold=true" alt="Author" loading="lazy">
<div class="author-info">
<span class="author-name" id="authorName">Author</span><br>
<span class="author-profession" id="authorProfession">Profession</span>
</div>
</div>
<span class="category-badge" id="categoryBadge">Category</span>
<p class="about-author" id="aboutAuthor">About the author...</p>
<div class="btn-row">
<button class="btn" onclick="prevQuote()" title="Prev">❮</button>
<button class="btn accent" onclick="randomQuote()">Random</button>
<button class="btn" onclick="nextQuote()" title="Next">❯</button>
<button class="btn" onclick="copyQuote()">Copy</button>
<button class="btn" onclick="shareQuote()">Share</button>
<button class="btn" id="favBtn" onclick="toggleFavorite()">♡</button>
<button class="btn" onclick="downloadQuoteImage()">Get</button>
<button class="btn" onclick="fetchRandomQuoteFromApi()">API</button>
</div>
<div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
<div class="btn-row" style="margin-top:0.6rem">
<button class="btn" onclick="toggleShuffle()" id="shuffleBtn">Shuffle: OFF</button>
<button class="btn" onclick="showHistory()">History</button>
</div>
</div>

<div style="margin-top:1.4rem">
<div class="section-heading"><h2>Trending Now</h2></div>
<div class="trending-row" id="trendingRow"></div>
</div>
</section>

<section class="section" id="section-authors" aria-labelledby="authorsHeading">
<div class="section-heading">
<h2 id="authorsHeading">Authors</h2>
<span class="muted-pill" id="authorsCountLabel">0</span>
</div>
<div class="search-container">
<input class="search-input" id="authorSearch" type="search" placeholder="Search authors..." oninput="debounceAuthors(this)">
<select class="search-select" id="authorCountryFilter" onchange="renderAuthors()">
<option value="">All</option>
</select>
<select class="search-select" id="authorProfessionFilter" onchange="renderAuthors()">
<option value="">All</option>
</select>
</div>
<div class="authors-grid" id="authorsGrid"></div>
</section>

<section class="section" id="section-categories" aria-labelledby="categoriesHeading">
<div class="section-heading">
<h2 id="categoriesHeading">Categories</h2>
<span class="muted-pill" id="categoriesCountLabel">0</span>
</div>
<div class="search-container">
<input class="search-input" id="categorySearch" type="search" placeholder="Search..." oninput="debounceCats(this)">
</div>
<div class="authors-grid" id="categoriesGrid"></div>
<div id="categoryQuotesContainer"></div>
</section>

<section class="section" id="section-favorites" aria-labelledby="favoritesHeading">
<div class="section-heading">
<h2 id="favoritesHeading">Favorites</h2>
<span class="muted-pill" id="favoritesCountLabel">0</span>
</div>
<div id="favoritesContainer" class="quote-list"></div>
</section>

<section class="section" id="section-top100" aria-labelledby="top100Heading">
<div class="section-heading">
<h2 id="top100Heading">Top 100</h2>
</div>
<div id="top100Container" class="quote-list"></div>
</section>

<section class="section" id="section-stats" aria-labelledby="statsHeading">
<div class="section-heading">
<h2 id="statsHeading">Stats</h2>
</div>
<div id="statsContainer" class="stats-grid"></div>
</section>
</main>

<div class="modal-overlay" id="authorModal" role="dialog" aria-modal="true" aria-label="Author profile">
<div class="modal-content" id="authorModalContent"></div>
</div>

<div class="modal-overlay" id="historyModal" role="dialog" aria-modal="true" aria-label="History">
<div class="modal-content" id="historyModalContent"></div>
</div>

<script>
"use strict";
const P={p:["Socrates|Philosopher|Greece|470 BC|399 BC|Platonic dialogues;Socratic method","Plato|Philosopher|Greece|428 BC|348 BC|The Republic;Symposium","Aristotle|Philosopher|Greece|384 BC|322 BC|Nicomachean Ethics;Politics","Confucius|Philosopher|China|551 BC|479 BC|The Analects;Doctrine of the Mean","Lao Tzu|Philosopher|China|6th century BC|Unknown|Tao Te Ching;Taoist teachings","Marcus Aurelius|Philosopher and Roman Emperor|Roman Empire|121|180|Meditations;Stoic journals","Seneca|Philosopher and Statesman|Roman Empire|4 BC|65|Letters from a Stoic;On the Shortness of Life"],s:["Galileo Galilei|Physicist and Astronomer|Italy|1564|1642|Telescope observations;Law of inertia","Isaac Newton|Physicist and Mathematician|England|1643|1727|Laws of motion;Law of universal gravitation","Marie Curie|Physicist and Chemist|Poland-France|1867|1934|Radioactivity discovery;Nobel Prize","Albert Einstein|Theoretical Physicist|Germany-USA|1879|1955|Theory of relativity;E=mc²"],b:["Steve Jobs|Entrepreneur and Inventor|USA|1955|2011|Apple founder;Innovation pioneer","Bill Gates|Entrepreneur and Philanthropist|USA|1955|Present|Microsoft founder;Global health","Warren Buffett|Investor and Businessman|USA|1930|Present|Berkshire Hathaway;Value investing"],sp:["Muhammad Ali|Boxer|USA|1942|2016|Heavy weight champion;Civil rights activist","Serena Williams|Tennis Player|USA|1981|Present|23 Grand Slam titles;Sports icon","Michael Jordan|Basketball Player|USA|1963|Present|NBA legend;6 championships"],l:["William Shakespeare|Playwright and Poet|England|1564|1616|Hamlet;Macbeth;Romeo and Juliet","Jane Austen|Novelist|England|1775|1817|Pride and Prejudice;Sense and Sensibility"],h:["Napoleon Bonaparte|Military Commander|France|1769|1821|Napoleonic Wars;Legal code","Winston Churchill|Prime Minister|England|1874|1965|WWII leadership;Speeches"],sp_cat:["Thich Nhat Hanh|Monk and Peace Activist|Vietnam|1926|2022|Mindfulness;Engaged Buddhism","Dalai Lama|Buddhist Spiritual Leader|Tibet|1935|Present|Compassion;Buddhist philosophy"]};
const Q={Philosophy:["The only way to deal with an unfree world is to become so absolutely free that your very existence is an act of rebellion.","In a gentle way, you can shake the world.","Life is what happens when you're busy making other plans.","The only way to solve a problem is to confront it.","In this moment, there is plenty of time."],Science:["Imagination is more important than knowledge.","If you wish to make an apple pie from scratch, you must first invent the universe.","Science is not a body of knowledge nor a belief system; it is just a process.","The important thing is not to stop questioning."],Business:["The only way to do great work is to love what you do.","Success is not final, failure is not fatal: it is the courage to continue that counts.","Don't watch the clock; do what it does. Keep going.","The way to get started is to quit talking and begin doing."],Sports:["You are never too old to set another goal or to dream a new dream.","The master has failed more times than the beginner has even tried.","Excellence is not a skill, it's an attitude.","It's not whether you get knocked down, it's whether you get up."],Literature:["It was the best of times, it was the worst of times.","All that is gold does not glitter; not all those that wander are lost.","We accept the love we think we deserve.","It is our choices that show what we truly are."],History:["The only thing we learn from history is that we learn nothing from history.","Those who cannot remember the past are condemned to repeat it.","The past cannot be changed. The future is yet in your power."],Spirituality:["The wound is the place where the Light enters you.","Stop acting so small. You are the universe in ecstatic motion.","Peace comes from within. Do not seek it without."]};
const C=["Philosophy","Science","Business","Sports","Literature","History","Spirituality"];
let AC=[],AU={},CA={},FV=new Set,HIS=[],CI=0,AI=0,FI=0,SD=!1,ST={qIdx:0},dTO={search:null,auth:null,cats:null};
function init(){
AC=Object.keys(P).map(g=>P[g]).flat().map(a=>{let[n,p,c,b,d,w]=a.split("|");return{n,p,c,b,d,w}});
AC.forEach((a,i)=>{if(!AU[a.n])AU[a.n]={...a};CA[i]=[]});
let qId=0;
Object.keys(Q).forEach(cat=>{Q[cat].forEach(qt=>{AC.forEach((a,ai)=>{CA[ai].push({text:qt,author:a.n,category:cat,id:qId})});qId++})});
FV.clear();
let saved=localStorage.getItem("fav");
if(saved)try{FV=new Set(JSON.parse(saved))}catch(e){}
HIS=[];
let hist=localStorage.getItem("hist");
if(hist)try{HIS=JSON.parse(hist).slice(-50)}catch(e){}
populateCategories();
randomQuote();
renderTrending();
setupEventListeners();
}
function populateCategories(){let s=document.getElementById("quoteCategoryFilter");C.forEach(cat=>{let o=document.createElement("option");o.value=cat;o.textContent=cat;s.appendChild(o)})}
function setupEventListeners(){document.getElementById("themeToggle").addEventListener("click",toggleTheme);document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeModal()}},!1)}
function debounceSearch(el){clearTimeout(dTO.search);dTO.search=setTimeout(()=>performQuoteSearch(),300)}
function debounceAuthors(el){clearTimeout(dTO.auth);dTO.auth=setTimeout(()=>renderAuthors(),300)}
function debounceCats(el){clearTimeout(dTO.cats);dTO.cats=setTimeout(()=>renderCategories(),300)}
function performQuoteSearch(){let srch=document.getElementById("quoteSearch").value.toLowerCase(),cat=document.getElementById("quoteCategoryFilter").value,res=document.getElementById("quoteSearchResults");if(!srch&&!cat){res.innerHTML="";return}let filtered=[];AC.forEach((a,ai)=>{if(!srch||a.n.toLowerCase().includes(srch)||a.p.toLowerCase().includes(srch)){CA[ai].forEach(q=>{if(!cat||q.category===cat){if(!srch||q.text.toLowerCase().includes(srch))filtered.push(q)}})}});filtered=filtered.slice(0,50);res.innerHTML=filtered.map(q=>`<div class="glass-card quote-list-card"><p>${q.text}</p><small>${q.author} • ${q.category}</small></div>`).join("")}
function randomQuote(){let qd=[];AC.forEach((a,i)=>{if(CA[i])qd.push(...CA[i])});let q=qd[Math.floor(Math.random()*qd.length)];displayQuote(q,AC.findIndex(a=>a.n===q.author))}
function nextQuote(){let curA=AI;for(let i=0;i<AC.length;i++){let j=(curA+i+1)%AC.length;if(CA[j]&&CA[j].length>0){let q=CA[j][Math.floor(Math.random()*CA[j].length)];displayQuote(q,j);return}}}
function prevQuote(){let curA=AI;for(let i=0;i<AC.length;i++){let j=(curA-i-1+AC.length)%AC.length;if(CA[j]&&CA[j].length>0){let q=CA[j][Math.floor(Math.random()*CA[j].length)];displayQuote(q,j);return}}}
function displayQuote(q,ai){if(!q)return;document.getElementById("quoteText").textContent=q.text;let a=AC[ai];document.getElementById("authorName").textContent=a.n;document.getElementById("authorProfession").textContent=a.p;document.getElementById("categoryBadge").textContent=q.category;document.getElementById("aboutAuthor").textContent=`${a.n} (${a.b}–${a.d}) - ${a.p}`;document.getElementById("authorPhoto").src=`https://ui-avatars.com/api/?name=${encodeURIComponent(a.n)}&size=130&background=246b6b&color=fff&bold=true`;document.getElementById("authorPhoto").alt=a.n;AI=ai;FI=q.id;updateFavBtn();let c=ST.qIdx;ST.qIdx=(ST.qIdx+1)%100;if(c>ST.qIdx)HIS.push(q);if(HIS.length>50)HIS.shift();localStorage.setItem("hist",JSON.stringify(HIS))}
function updateFavBtn(){let btn=document.getElementById("favBtn");FV.has(FI)?btn.innerHTML="♥":btn.innerHTML="♡"}
function toggleFavorite(){let btn=document.getElementById("favBtn");FV.has(FI)?(FV.delete(FI),btn.innerHTML="♡"):(FV.add(FI),btn.innerHTML="♥");localStorage.setItem("fav",JSON.stringify(Array.from(FV)));btn.classList.add("heart-beat");setTimeout(()=>btn.classList.remove("heart-beat"),400)}
function copyQuote(){let txt=document.getElementById("quoteText").textContent,auth=document.getElementById("authorName").textContent;navigator.clipboard.writeText(`"${txt}" — ${auth}`).then(()=>{showToast("Copied!")}).catch(()=>{showToast("Copy failed")})}
function shareQuote(){let txt=document.getElementById("quoteText").textContent,auth=document.getElementById("authorName").textContent;if(navigator.share){navigator.share({title:"InspireFlow",text:`"${txt}" — ${auth}`}).catch(()=>{})}else{copyQuote()}}
function toggleShuffle(){SD=!SD;document.getElementById("shuffleBtn").textContent=`Shuffle: ${SD?"ON":"OFF"}`}
function showHistory(){let m=document.getElementById("historyModal"),c=document.getElementById("historyModalContent");if(!HIS.length){c.innerHTML="<p class='empty-state'>No history yet</p>";m.classList.add("visible");return}let h=`<button class='modal-close' onclick="closeModal()">&times;</button><h2>Quote History</h2>`;HIS.slice().reverse().forEach(q=>{h+=`<div class='glass-card quote-list-card'><p>${q.text}</p><small>${q.author}</small></div>`});c.innerHTML=h;m.classList.add("visible")}
function renderAuthors(){let srch=document.getElementById("authorSearch").value.toLowerCase(),cty=document.getElementById("authorCountryFilter").value,prfn=document.getElementById("authorProfessionFilter").value,g=document.getElementById("authorsGrid"),filtered=[];AC.filter(a=>{let match=!0;if(srch&&!a.n.toLowerCase().includes(srch)&&!a.p.toLowerCase().includes(srch))match=!1;if(cty&&a.c!==cty)match=!1;if(prfn&&a.p!==prfn)match=!1;return match}).forEach((a,i)=>{filtered.push(a)});let ct=new Set(AC.map(a=>a.c)),pf=new Set(AC.map(a=>a.p));document.getElementById("authorCountryFilter").innerHTML='<option value="">All</option>'+Array.from(ct).sort().map(c=>`<option value="${c}">${c}</option>`).join("");document.getElementById("authorProfessionFilter").innerHTML='<option value="">All</option>'+Array.from(pf).sort().map(p=>`<option value="${p}">${p}</option>`).join("");document.getElementById("authorsCountLabel").textContent=`${filtered.length}`;g.innerHTML=filtered.map(a=>`<div class='glass-card author-card' onclick="showAuthorModal('${a.n}')"><img class='author-photo-lg' src='https://ui-avatars.com/api/?name=${encodeURIComponent(a.n)}&size=130&background=246b6b&color=fff&bold=true' alt='${a.n}' loading='lazy'><h3>${a.n}</h3><div class='meta'>${a.p}</div></div>`).join("")}
function renderCategories(){let srch=document.getElementById("categorySearch").value.toLowerCase(),g=document.getElementById("categoriesGrid"),filtered=C.filter(c=>c.toLowerCase().includes(srch));document.getElementById("categoriesCountLabel").textContent=`${filtered.length}`;g.innerHTML=filtered.map(c=>`<div class='glass-card author-card' onclick="showCategoryQuotes('${c}')"><div style='font-size:2.5rem;margin-bottom:0.5rem'>📚</div><h3>${c}</h3></div>`).join("");if(srch){let container=document.getElementById("categoryQuotesContainer"),qts=[];AC.forEach((a,ai)=>{CA[ai].filter(q=>q.category.toLowerCase().includes(srch)).forEach(q=>qts.push(q))});container.innerHTML=qts.length?`<div class='section-heading'><h3>Matching Quotes</h3></div><div class='quote-list'>${qts.slice(0,30).map(q=>`<div class='glass-card quote-list-card'><p>${q.text}</p><small>${q.author} • ${q.category}</small></div>`).join("")}</div>`:""}else{document.getElementById("categoryQuotesContainer").innerHTML=""}}
function showCategoryQuotes(cat){let m=document.getElementById("historyModal"),c=document.getElementById("historyModalContent"),qts=[];AC.forEach((a,ai)=>{CA[ai].filter(q=>q.category===cat).forEach(q=>qts.push(q))});let h=`<button class='modal-close' onclick="closeModal()">&times;</button><h2>${cat} Quotes</h2><div class='quote-list'>`;h+=qts.slice(0,50).map(q=>`<div class='glass-card quote-list-card'><p>${q.text}</p><small>${q.author}</small></div>`).join("");h+="</div>";c.innerHTML=h;m.classList.add("visible")}
function showAuthorModal(nm){let a=AC.find(x=>x.n===nm);if(!a)return;let m=document.getElementById("authorModal"),c=document.getElementById("authorModalContent"),h=`<button class='modal-close' onclick="closeModal()">&times;</button><img class='author-photo-lg' src='https://ui-avatars.com/api/?name=${encodeURIComponent(a.n)}&size=200&background=246b6b&color=fff&bold=true' alt='${a.n}'><h2>${a.n}</h2><p class='about-author'><strong>${a.p}</strong> from ${a.c}</p><p class='about-author'>Years: ${a.b}–${a.d}</p>`;let qi=AC.indexOf(a);if(qi>=0&&CA[qi]){let qts=CA[qi];h+=`<div style='margin-top:1rem'><h3 style='margin-bottom:0.5rem'>Top Quotes</h3><div class='quote-list'>`;h+=qts.slice(0,10).map(q=>`<div class='glass-card quote-list-card'><p>${q.text}</p></div>`).join("");h+="</div></div>"}c.innerHTML=h;m.classList.add("visible")}
function closeModal(){document.getElementById("authorModal").classList.remove("visible");document.getElementById("historyModal").classList.remove("visible")}
function renderFavorites(){let c=document.getElementById("favoritesContainer"),qts=[];AC.forEach((a,ai)=>{CA[ai].filter(q=>FV.has(q.id)).forEach(q=>qts.push(q))});document.getElementById("favoritesCountLabel").textContent=`${qts.length}`;c.innerHTML=qts.length?qts.map(q=>`<div class='glass-card quote-list-card'><p>${q.text}</p><small>${q.author}</small></div>`).join(""):"<p class='empty-state'>No favorites yet</p>"}
function renderTop100(){let c=document.getElementById("top100Container"),qts=[];AC.forEach((a,ai)=>{CA[ai].forEach(q=>qts.push(q))});let top=qts.slice(0,100);c.innerHTML=top.map((q,i)=>`<div class='glass-card quote-list-card'><p>#${i+1}: ${q.text}</p><small>${q.author}</small></div>`).join("")}
function renderStats(){let c=document.getElementById("statsContainer"),totalQ=Object.keys(Q).reduce((sum,k)=>sum+Q[k].length,0);let h=`<div class='glass-card stat-panel'><h3>Total</h3><p style='font-size:1.8rem;font-weight:800;color:var(--accent)'>${totalQ}</p><small>quotes</small></div><div class='glass-card stat-panel'><h3>Authors</h3><p style='font-size:1.8rem;font-weight:800;color:var(--accent2)'>${AC.length}</p><small>people</small></div><div class='glass-card stat-panel'><h3>Categories</h3><p style='font-size:1.8rem;font-weight:800;color:var(--accent3)'>${C.length}</p><small>topics</small></div><div class='glass-card stat-panel'><h3>Favorites</h3><p style='font-size:1.8rem;font-weight:800;color:#2e7d56'>${FV.size}</p><small>saved</small></div>`;c.innerHTML=h;document.getElementById("quoteCounter").textContent=totalQ;document.getElementById("authorCounter").textContent=AC.length;document.getElementById("categoryCounter").textContent=C.length}
function renderTrending(){let c=document.getElementById("trendingRow"),qts=[];AC.forEach((a,ai)=>{if(CA[ai])qts.push(...CA[ai])});let trnd=qts.slice(0,6);c.innerHTML=trnd.map(q=>`<div class='glass-card quote-list-card' onclick="copyQuote()"><p>${q.text.substring(0,60)}...</p><small>${q.author}</small></div>`).join("")}
function navigateTo(s){let secs=document.querySelectorAll(".section"),btns=document.querySelectorAll(".nav-links button");secs.forEach(sec=>sec.classList.remove("active"));btns.forEach(btn=>btn.classList.remove("active"));document.getElementById(`section-${s}`).classList.add("active");btns.forEach(b=>{if(b.getAttribute("data-nav")===s)b.classList.add("active")});s==="favorites"&&renderFavorites();s==="top100"&&renderTop100();s==="stats"&&(renderStats(),renderFavorites());s==="home"&&(renderTrending(),updateFavBtn());s==="categories"&&renderCategories();s==="authors"&&renderAuthors()}
function downloadQuoteImage(){let txt=document.getElementById("quoteText").textContent,auth=document.getElementById("authorName").textContent,can=document.createElement("canvas");can.width=800;can.height=400;let ctx=can.getContext("2d");ctx.fillStyle="#246b6b";ctx.fillRect(0,0,can.width,can.height);ctx.fillStyle="#fff";ctx.font="bold 24px Arial";let lines=txt.match(/.{1,50}/g)||[txt];let y=100;lines.slice(0,6).forEach(line=>{ctx.fillText(line,50,y);y+=40});ctx.font="italic 20px Arial";ctx.fillText(`— ${auth}`,50,y+40);let link=document.createElement("a");link.href=can.toDataURL();link.download="quote.png";link.click()}
async function fetchRandomQuoteFromApi(){try{let res=await fetch("https://api.quotable.io/random?maxLength=200");if(!res.ok)throw new Error("API error");let data=await res.json();document.getElementById("quoteText").textContent=data.content;document.getElementById("authorName").textContent=data.author||"Unknown";document.getElementById("categoryBadge").textContent=data.tags[0]||"Inspiration";showToast("Quote from API!")}catch(e){showToast("API unavailable")}}
function showToast(msg){let t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>{t.style.display="none"},2500)}
function toggleTheme(){let html=document.documentElement;html.getAttribute("data-theme")==="light"?html.setAttribute("data-theme","dark"):html.setAttribute("data-theme","light")}
document.addEventListener("DOMContentLoaded",init,!1);
</script>
</body>
</html>
